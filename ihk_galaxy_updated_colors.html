b299ed874de5e7f82ea6442e5af962e2", "target": "c2e10c49a41fee223d1284cc370a50ae", "value": 0.5, "type": "direct", "status": "dummy"}, {"source": "c0193b3582bf89965a078a8fd0ab2e3f", "target": "7a01e7274edd10abe610c9f135284dc9", "value": 2, "type": "parent", "status": "dummy"}, {"source": "c0193b3582bf89965a078a8fd0ab2e3f", "target": "c2e10c49a41fee223d1284cc370a50ae", "value": 0.5, "type": "direct", "status": "dummy"}, {"source": "104bb1dd462a3000ddd3f0e67387f7f0", "target": "c2e10c49a41fee223d1284cc370a50ae", "value": 1, "type": "cluster", "status": "dummy"}, {"source": "0c116b64d04e7c1c156aa9e4049864dd", "target": "104bb1dd462a3000ddd3f0e67387f7f0", "value": 2, "type": "parent", "status": "dummy"}, {"source": "0c116b64d04e7c1c156aa9e4049864dd", "target": "c2e10c49a41fee223d1284cc370a50ae", "value": 0.5, "type": "direct", "status": "dummy"}, {"source": "9b85f359eb8f2b41f2e5f76c0b7c77c9", "target": "104bb1dd462a3000ddd3f0e67387f7f0", "value": 2, "type": "parent", "status": "dummy"}, {"source": "9b85f359eb8f2b41f2e5f76c0b7c77c9", "target": "c2e10c49a41fee223d1284cc370a50ae", "value": 0.5, "type": "direct", "status": "dummy"}, {"source": "fef274b6f3505727a6af99d4d00cccc5", "target": "104bb1dd462a3000ddd3f0e67387f7f0", "value": 2, "type": "parent", "status": "dummy"}, {"source": "fef274b6f3505727a6af99d4d00cccc5", "target": "c2e10c49a41fee223d1284cc370a50ae", "value": 0.5, "type": "direct", "status": "dummy"}]};
            const width = window.innerWidth;
            const height = window.innerHeight;

            const svg = d3.select("#viz")
                .attr("width", width)
                .attr("height", height);

            const defs = svg.append("defs");
            const filter = defs.append("filter").attr("id", "glow");
            filter.append("feGaussianBlur").attr("stdDeviation", "2.5").attr("result", "coloredBlur");
            const feMerge = filter.append("feMerge");
            feMerge.append("feMergeNode").attr("in", "coloredBlur");
            feMerge.append("feMergeNode").attr("in", "SourceGraphic");

            const g = svg.append("g");
            svg.call(d3.zoom().scaleExtent([0.1, 4]).on("zoom", (event) => {
                g.attr("transform", event.transform);
            }));

            document.getElementById('loading').style.display = 'none';

            const simulation = d3.forceSimulation(data.nodes)
                .force("link", d3.forceLink(data.links)
                    .id(d => d.id)
                    .distance(d => {
                        if (d.type === 'parent') return 40;
                        if (d.type === 'cluster') return 120;
                        return 300;
                    })
                    .strength(d => d.type === 'direct' ? 0.02 : 0.5)
                )
                .force("charge", d3.forceManyBody().strength(-200))
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("collide", d3.forceCollide().radius(d => d.radius + 5).iterations(2));

            const link = g.append("g")
                .selectAll("line")
                .data(data.links)
                .join("line")
                .attr("stroke", d => {
                    if (d.status === 'dummy') return "#333";
                    if (d.type === 'direct') return "#ff0055"; 
                    if (d.type === 'parent') return "#ffffff"; // Parent link matches component color
                    return "#FFD700";
                })
                .attr("stroke-opacity", d => d.type === 'direct' ? 0 : (d.status==='dummy'?0.1:0.2))
                .attr("stroke-width", d => d.type === 'direct' ? 1 : 1.5);

            const node = g.append("g")
                .selectAll("circle")
                .data(data.nodes)
                .join("circle")
                .attr("r", d => d.radius)
                .attr("fill", d => d.color)
                .style("filter", d => d.status === 'real' ? "url(#glow)" : "none")
                .attr("cursor", "pointer")
                .call(drag(simulation));

            // Labels for Comps now show just the cleaned number
            const labels = g.append("g")
                .selectAll("text")
                .data(data.nodes.filter(d => d.group !== 'UC'))
                .join("text")
                .text(d => d.label)
                .attr("x", d => d.group === 'LF' ? 12 : 0) // Center label for components
                .attr("y", d => d.group === 'LF' ? 4 : 4)
                .attr("text-anchor", d => d.group === 'LF' ? "start" : "middle")
                .style("font-size", d => d.group === 'LF' ? "14px" : "11px")
                .style("font-weight", "bold")
                .style("fill", d => d.group === 'Comp' ? "#000" : (d.status === 'dummy' ? "#777" : "#fff")) // Black text on white comp balls
                .style("pointer-events", "none");

            const tooltip = d3.select("#tooltip");

            node.on("mouseover", function(event, d) {
                tooltip.transition().duration(100).style("opacity", 1);
                
                // Show full name in tooltip if it's a component, otherwise standard label
                let displayLabel = d.label;
                if(d.group === 'Comp' && d.status === 'real') {
                     displayLabel = "Component " + d.label;
                }

                tooltip.html(`
                    <strong style="color:${d.color === '#ffffff' ? '#00d2ff' : d.color}">${d.group}</strong><br/>
                    ${displayLabel}
                `)
                .style("left", (event.pageX + 15) + "px")
                .style("top", (event.pageY - 15) + "px");

                const connectedLinks = data.links.filter(l => l.source.id === d.id || l.target.id === d.id);
                const connectedNodeIds = new Set();
                connectedLinks.forEach(l => {
                    connectedNodeIds.add(l.source.id);
                    connectedNodeIds.add(l.target.id);
                });
                connectedNodeIds.add(d.id);

                node.transition().duration(200).style("opacity", n => connectedNodeIds.has(n.id) ? 1 : 0.1);
                labels.transition().duration(200).style("opacity", n => connectedNodeIds.has(n.id) ? 1 : 0.1);
                
                link.transition().duration(200)
                    .attr("stroke-opacity", l => {
                        if (l.source.id === d.id || l.target.id === d.id) return 0.8;
                        return 0.05;
                    })
                    .attr("stroke", l => {
                         if (l.source.id === d.id || l.target.id === d.id) return l.status==='dummy'?"#777": (l.type==='direct'?"#ff0055": (l.type==='parent'?"#ffffff":"#FFD700"));
                         return "#333";
                    });
            })
            .on("mouseout", function() {
                tooltip.transition().duration(200).style("opacity", 0);
                node.transition().duration(200).style("opacity", 1);
                labels.transition().duration(200).style("opacity", 1);
                link.transition().duration(200)
                    .attr("stroke-opacity", d => d.type === 'direct' ? 0 : (d.status==='dummy'?0.1:0.2))
                    .attr("stroke", d => {
                        if (d.status === 'dummy') return "#333";
                        if (d.type === 'direct') return "#ff0055"; 
                        if (d.type === 'parent') return "#ffffff";
                        return "#FFD700";
                    });
            });

            simulation.on("tick", () => {
                link.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
                node.attr("cx", d => d.x).attr("cy", d => d.y);
                labels.attr("x", d => d.group === 'Comp' ? d.x : d.x + d.radius + 5)
                      .attr("y", d => d.group === 'Comp' ? d.y + 4 : d.y + 4);
            });

            function drag(simulation) {
                function dragstarted(event) { if (!event.active) simulation.alphaTarget(0.3).restart(); event.subject.fx = event.subject.x; event.subject.fy = event.subject.y; }
                function dragged(event) { event.subject.fx = event.x; event.subject.fy = event.y; }
                function dragended(event) { if (!event.active) simulation.alphaTarget(0); event.subject.fx = null; event.subject.fy = null; }
                return d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended);
            }

            setInterval(() => { simulation.alpha(0.01).restart(); }, 2000);
            
            window.searchNodes = function() {
                const val = document.getElementById('search').value.toLowerCase();
                if(!val) return;
                node.style("opacity", n => n.label.toLowerCase().includes(val) ? 1 : 0.1);
                labels.style("opacity", n => n.label.toLowerCase().includes(val) ? 1 : 0.1);
            }
        };
    </script>
